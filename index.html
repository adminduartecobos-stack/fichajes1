<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FichajesPro</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;--bg2:#12121a;--bg3:#1a1a26;--bg4:#22223a;
  --accent:#6c63ff;--accent2:#a78bfa;--accent3:#38bdf8;
  --success:#34d399;--danger:#f87171;--warn:#fbbf24;
  --text:#f0f0ff;--text2:#9090b8;--text3:#5a5a80;
  --border:#2a2a40;--border2:#3a3a55;
  --card:#141420;--card2:#1c1c2e;
  --radius:14px;--radius2:20px;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
@keyframes fadeIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes glow{0%,100%{box-shadow:0 0 20px rgba(108,99,255,.25)}50%{box-shadow:0 0 45px rgba(108,99,255,.55)}}
@keyframes countUp{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
.animate{animation:fadeIn .35s ease both}
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:10px;border:none;cursor:pointer;font-family:inherit;font-size:14px;font-weight:500;transition:all .2s}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:#7c74ff;transform:translateY(-1px);box-shadow:0 4px 20px rgba(108,99,255,.4)}
.btn-danger{background:rgba(248,113,113,.12);color:var(--danger);border:1px solid rgba(248,113,113,.25)}.btn-danger:hover{background:rgba(248,113,113,.22)}
.btn-success{background:rgba(52,211,153,.12);color:var(--success);border:1px solid rgba(52,211,153,.25)}.btn-success:hover{background:rgba(52,211,153,.22)}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border2)}.btn-ghost:hover{background:var(--bg3);color:var(--text)}
.btn-accent{background:rgba(108,99,255,.15);color:var(--accent2);border:1px solid rgba(108,99,255,.25)}.btn-accent:hover{background:rgba(108,99,255,.25)}
.btn-info{background:rgba(56,189,248,.12);color:var(--accent3);border:1px solid rgba(56,189,248,.25)}.btn-info:hover{background:rgba(56,189,248,.22)}
.btn-sm{padding:6px 14px;font-size:13px;border-radius:8px}
.btn-block{width:100%;justify-content:center;padding:14px}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none!important;box-shadow:none!important}
.input-group{margin-bottom:16px}
.input-group label{display:block;font-size:13px;color:var(--text2);margin-bottom:5px;font-weight:500}
.input-field{width:100%;padding:11px 15px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:inherit;font-size:14px;outline:none;transition:all .2s}
.input-field:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(108,99,255,.12)}
.input-field::placeholder{color:var(--text3)}
textarea.input-field{resize:vertical;min-height:88px}
select.input-field{cursor:pointer}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius2);padding:24px}
.card2{background:var(--card2);border:1px solid var(--border);border-radius:var(--radius);padding:18px}
.stat-card{background:var(--card2);border:1px solid var(--border);border-radius:var(--radius);padding:20px;transition:border-color .2s}
.stat-card:hover{border-color:var(--border2)}
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:500;white-space:nowrap}
.badge-success{background:rgba(52,211,153,.13);color:var(--success)}
.badge-danger{background:rgba(248,113,113,.13);color:var(--danger)}
.badge-warn{background:rgba(251,191,36,.13);color:var(--warn)}
.badge-info{background:rgba(56,189,248,.13);color:var(--accent3)}
.badge-gray{background:var(--bg3);color:var(--text2)}
.badge-purple{background:rgba(108,99,255,.13);color:var(--accent2)}
.nav{display:flex;align-items:center;justify-content:space-between;padding:14px 28px;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.nav-brand{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;background:linear-gradient(135deg,var(--accent2),var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;position:relative}
.login-bg{position:fixed;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(108,99,255,.12) 0,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(56,189,248,.08) 0,transparent 50%),var(--bg)}
.login-card{width:100%;max-width:420px;position:relative;z-index:1}
.login-logo{text-align:center;margin-bottom:28px}
.login-logo h1{font-family:'Syne',sans-serif;font-size:34px;font-weight:800;background:linear-gradient(135deg,var(--accent2) 0%,var(--accent3) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.login-logo p{color:var(--text2);font-size:13px;margin-top:5px}
.layout{display:flex;min-height:calc(100vh - 57px)}
.sidebar{width:215px;min-width:215px;background:var(--bg2);border-right:1px solid var(--border);padding:16px 10px;display:flex;flex-direction:column;gap:2px}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;cursor:pointer;transition:all .15s;color:var(--text2);font-size:13.5px;font-weight:500;border:none;background:transparent;font-family:inherit;width:100%;text-align:left}
.sidebar-item:hover{background:var(--bg3);color:var(--text)}
.sidebar-item.active{background:rgba(108,99,255,.14);color:var(--accent2)}
.main-content{flex:1;padding:26px 28px;overflow-y:auto}
.table-wrap{overflow-x:auto;border-radius:12px;border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:13.5px}
thead tr{background:var(--bg3)}
th{padding:10px 15px;text-align:left;font-size:11px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:.6px;white-space:nowrap}
td{padding:12px 15px;border-top:1px solid var(--border);vertical-align:middle}
tr:hover td{background:rgba(108,99,255,.03)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;backdrop-filter:blur(5px)}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius2);padding:26px;width:100%;max-width:490px;animation:fadeIn .25s ease;max-height:90vh;overflow-y:auto}
.alert{padding:11px 15px;border-radius:10px;font-size:13px;margin-bottom:14px;display:flex;align-items:center;gap:9px}
.alert-danger{background:rgba(248,113,113,.09);border:1px solid rgba(248,113,113,.25);color:var(--danger)}
.alert-success{background:rgba(52,211,153,.09);border:1px solid rgba(52,211,153,.25);color:var(--success)}
.alert-info{background:rgba(108,99,255,.09);border:1px solid rgba(108,99,255,.25);color:var(--accent2)}
.alert-warn{background:rgba(251,191,36,.09);border:1px solid rgba(251,191,36,.25);color:var(--warn)}
.toast-container{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{padding:12px 18px;border-radius:12px;font-size:13.5px;font-weight:500;max-width:340px;animation:fadeIn .3s ease;display:flex;align-items:center;gap:10px;pointer-events:auto}
.toast-success{background:rgba(20,30,24,.95);border:1px solid rgba(52,211,153,.4);color:var(--success)}
.toast-danger{background:rgba(30,14,14,.95);border:1px solid rgba(248,113,113,.4);color:var(--danger)}
.toast-info{background:rgba(14,14,30,.95);border:1px solid rgba(108,99,255,.4);color:var(--accent2)}
.spinner{width:17px;height:17px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;flex-shrink:0}
.spinner-dark{border-color:rgba(108,99,255,.2);border-top-color:var(--accent)}
.fichar-wrap{display:flex;justify-content:center;align-items:center;gap:20px;margin:24px 0;flex-wrap:wrap}
.fichar-btn{width:155px;height:155px;border-radius:50%;border:none;cursor:pointer;font-family:inherit;font-weight:600;transition:all .25s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;font-size:14px;position:relative}
.fichar-btn:hover:not(:disabled){transform:scale(1.06)}
.fichar-btn:disabled{opacity:.55;cursor:not-allowed;transform:none}
.fichar-btn-entry{background:linear-gradient(135deg,#6c63ff,#a78bfa);color:#fff;animation:glow 3s ease infinite}
.fichar-btn-exit{background:linear-gradient(135deg,#f87171,#fb923c);color:#fff}
.fichar-btn-pause{background:linear-gradient(135deg,#fbbf24,#f97316);color:#fff}
.fichar-btn-resume{background:linear-gradient(135deg,#34d399,#06b6d4);color:#fff}
.clock-big{font-family:'Syne',sans-serif;font-size:50px;font-weight:800;letter-spacing:-2px;line-height:1}
.clock-date{font-size:14px;color:var(--text2);margin-top:4px;text-transform:capitalize}
.status-pill{display:inline-flex;align-items:center;gap:7px;padding:6px 14px;border-radius:20px;font-size:13px;font-weight:500}
.status-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.s-working{background:rgba(52,211,153,.12);color:var(--success)}.s-working .status-dot{background:var(--success);animation:pulse 2s infinite}
.s-paused{background:rgba(251,191,36,.12);color:var(--warn)}.s-paused .status-dot{background:var(--warn);animation:pulse 2s infinite}
.s-out{background:var(--bg3);color:var(--text2)}.s-out .status-dot{background:var(--text3)}
.s-done{background:rgba(108,99,255,.1);color:var(--accent2)}.s-done .status-dot{background:var(--accent2)}
.loc-btn{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:var(--accent3);background:rgba(56,189,248,.09);padding:3px 9px;border-radius:20px;cursor:pointer;border:none;font-family:inherit;transition:background .15s;white-space:nowrap}
.loc-btn:hover{background:rgba(56,189,248,.18)}
.avatar{border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;flex-shrink:0}
h2{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;margin-bottom:3px}
h3{font-size:15px;font-weight:600;margin-bottom:10px}
.text-muted{color:var(--text2);font-size:13.5px}
.text-sm{font-size:12.5px}
.flex{display:flex;align-items:center}
.flex-between{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.flex-col{display:flex;flex-direction:column}
.gap6{gap:6px}.gap8{gap:8px}.gap10{gap:10px}.gap12{gap:12px}.gap16{gap:16px}
.mt8{margin-top:8px}.mt12{margin-top:12px}.mt16{margin-top:16px}.mt20{margin-top:20px}.mt24{margin-top:24px}
.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}.mb16{margin-bottom:16px}.mb20{margin-bottom:20px}.mb24{margin-bottom:24px}
.empty{text-align:center;padding:48px 20px;color:var(--text2)}
.empty-icon{font-size:36px;margin-bottom:10px;opacity:.55}
.grid-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:22px}
.stat-val{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:var(--text);animation:countUp .4s ease}
.stat-label{font-size:12px;color:var(--text2);margin-top:3px}
.progress-bar{height:5px;background:var(--bg4);border-radius:3px;overflow:hidden;margin-top:10px}
.progress-fill{height:100%;border-radius:3px;transition:width .6s ease}
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:16px}
.tag-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
code{background:var(--bg3);padding:2px 7px;border-radius:5px;font-size:12px;color:var(--accent2)}

/* CALENDARIO */
.cal-wrap{background:var(--card2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.cal-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:var(--bg3);border-bottom:1px solid var(--border)}
.cal-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;text-transform:capitalize}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr)}
.cal-day-name{padding:10px 0;text-align:center;font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.5px;background:var(--bg3);border-bottom:1px solid var(--border)}
.cal-day{min-height:70px;padding:8px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);position:relative;cursor:pointer;transition:background .15s}
.cal-day:hover{background:rgba(108,99,255,.05)}
.cal-day.other-month{opacity:.35}
.cal-day.today .cal-day-num{background:var(--accent);color:#fff;border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center}
.cal-day-num{font-size:13px;font-weight:500;margin-bottom:4px;width:24px;height:24px;display:flex;align-items:center;justify-content:center}
.cal-dot{width:6px;height:6px;border-radius:50%;margin:1px}
.cal-dots{display:flex;flex-wrap:wrap;gap:2px;margin-top:2px}
.cal-day.has-entry{background:rgba(52,211,153,.04)}
.cal-day.has-entry:hover{background:rgba(52,211,153,.08)}

/* TABS */
.tabs{display:flex;gap:4px;background:var(--bg3);padding:4px;border-radius:10px;margin-bottom:20px}
.tab{padding:7px 16px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);border:none;background:transparent;font-family:inherit;transition:all .15s}
.tab.active{background:var(--bg2);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.3)}

/* INFORME PDF */
.report-table{width:100%;border-collapse:collapse;font-size:13px}
.report-table th{background:var(--bg3);padding:8px 12px;text-align:left;font-size:11px;color:var(--text2);font-weight:600;text-transform:uppercase}
.report-table td{padding:10px 12px;border-top:1px solid var(--border)}

/* ===================== BOTTOM NAV MOBILE ===================== */
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);z-index:200;padding:8px 0 env(safe-area-inset-bottom,8px)}
.bottom-nav-inner{display:flex;justify-content:space-around;align-items:center}
.bottom-nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 12px;border-radius:10px;cursor:pointer;border:none;background:transparent;font-family:inherit;color:var(--text3);font-size:10px;font-weight:500;transition:all .15s;position:relative;min-width:56px}
.bottom-nav-item.active{color:var(--accent2)}
.bottom-nav-item.active svg{stroke:var(--accent2)}
.bottom-nav-item svg{stroke:var(--text3);transition:stroke .15s}
.bottom-nav-badge{position:absolute;top:4px;right:8px;background:var(--warn);color:#000;border-radius:50%;width:14px;height:14px;font-size:9px;display:flex;align-items:center;justify-content:center;font-weight:700}

@media(max-width:720px){
  /* Layout */
  .sidebar{display:none}
  .layout{flex-direction:column}
  .main-content{padding:16px 14px 90px;min-height:calc(100vh - 57px)}
  .bottom-nav{display:block}

  /* Nav */
  .nav{padding:10px 14px}
  .nav-brand{font-size:17px}

  /* Clock y fichar */
  .clock-big{font-size:32px;letter-spacing:-1px}
  .clock-date{font-size:12px}
  .fichar-wrap{gap:14px;margin:18px 0}
  .fichar-btn{width:110px;height:110px;font-size:12px}

  /* Stats */
  .grid-stats{grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
  .stat-val{font-size:22px}
  .stat-card{padding:14px}

  /* Cards */
  .card{padding:16px}
  .card2{padding:14px}

  /* Flex adaptations */
  .flex-between{flex-direction:column;align-items:flex-start;gap:8px}
  .flex-between .flex{flex-wrap:wrap}

  /* Tablas en móvil */
  .table-wrap{border-radius:10px}
  table{font-size:12px}
  th{padding:8px 10px;font-size:10px}
  td{padding:10px 10px}

  /* Modales */
  .modal{padding:18px;border-radius:16px 16px 0 0;position:fixed;bottom:0;left:0;right:0;max-width:100%;max-height:92vh;margin:0;border-bottom:none}
  .modal-overlay{align-items:flex-end;padding:0}

  /* Botones en filas */
  .btn-sm{padding:6px 10px;font-size:12px}

  /* Tabs */
  .tabs{margin-bottom:14px}
  .tab{padding:6px 12px;font-size:12px}

  /* Calendario */
  .cal-day{min-height:48px;padding:5px}
  .cal-day-num{font-size:11px}
  .cal-day-name{font-size:9px;padding:7px 0}

  /* Historial filtros */
  .input-field[type=month]{width:100%!important}

  /* Empleados admin */
  .card2 .flex-between{gap:10px}
  .card2 .flex-between > div:last-child{width:100%;justify-content:flex-start;flex-wrap:wrap}

  /* Ocultar columnas secundarias en tabla */
  .hide-mobile{display:none}

  /* Informes */
  .report-table th:nth-child(3),
  .report-table td:nth-child(3){display:none}

  h2{font-size:18px}
  h3{font-size:14px}
  .text-muted{font-size:12.5px}
}

@media(max-width:400px){
  .fichar-btn{width:95px;height:95px;font-size:11px}
  .grid-stats{grid-template-columns:1fr}
  .clock-big{font-size:28px}
  .bottom-nav-item{padding:6px 8px;min-width:44px;font-size:9px}
}
</style>
</head>
<body>
<div id="app">
  <div class="loading-screen">
    <div style="font-family:'Syne',sans-serif;font-size:30px;font-weight:800;background:linear-gradient(135deg,#a78bfa,#38bdf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent">FichajesPro</div>
    <div class="spinner spinner-dark" style="width:26px;height:26px;border-width:3px"></div>
    <p style="color:var(--text2);font-size:13px">Cargando sistema...</p>
  </div>
</div>
<div class="toast-container" id="toasts"></div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzs20Zg6Tj5PpL9_4P_TdveY24ijFrTuVAj4_L9tjgR7sFtlcG5oPM9xFvh4-NHnZ8/exec';

let S = {
  user:null, view:'login',
  adminSection:'employees', employeeSection:'fichar',
  records:[], corrections:[], employees:[],
  alert:null, modal:null, locationModal:null,
  ficharLoading:false,
  historialFilter:'', historialTab:'lista',
  adminHistorialFilter:'', adminHistorialTab:'lista',
  calYear: new Date().getFullYear(), calMonth: new Date().getMonth(),
  adminCalYear: new Date().getFullYear(), adminCalMonth: new Date().getMonth(),
  reportData: null, reportMonth: '', reportYear: '',
};

async function api(action, data={}) {
  try {
    const res = await fetch(SCRIPT_URL, {
      method: 'POST',
      redirect: 'follow',
      body: JSON.stringify({action, data})
    });
    const text = await res.text();
    return JSON.parse(text);
  } catch(e) { return {error:'Error de conexión: '+e.message}; }
}

// UTILS
const fmt     = d => d.toTimeString().slice(0,5);
const fmtDate = d => { if(typeof d==='string') d=new Date(d+'T00:00:00'); return d.toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit',year:'numeric'}); };
const fmtLong = d => d.toLocaleDateString('es-ES',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
const initials= n => (n||'?').split(' ').slice(0,2).map(x=>x[0]).join('').toUpperCase();
const todayStr= () => new Date().toISOString().slice(0,10);
const typeLabel={entry:'Entrada',pause:'Pausa',resume:'Fin Pausa',exit:'Salida'};
const typeBadge={entry:'badge-success',pause:'badge-warn',resume:'badge-info',exit:'badge-danger'};
const typeIcon={
  entry:`<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M15 12H3"/></svg>`,
  pause:`<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>`,
  resume:`<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>`,
  exit:`<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>`,
};

function getShiftStatus(userId) {
  const uid = userId || (S.user ? S.user.id : null);
  if(!uid) return 'out';
  const today=todayStr();
  const tr=S.records.filter(r=>r.userId===uid&&r.date===today).sort((a,b)=>a.time.localeCompare(b.time));
  if(!tr.length) return 'out';
  const t=tr[tr.length-1].type;
  return t==='pause'?'paused':t==='exit'?'out':'working';
}

function calcTodayHours() {
  const today=todayStr();
  const tr=S.records.filter(r=>r.userId===S.user.id&&r.date===today).sort((a,b)=>a.time.localeCompare(b.time));
  let mins=0, entry=null;
  tr.forEach(r=>{
    const [h,m]=r.time.split(':').map(Number),t=h*60+m;
    if(r.type==='entry'||r.type==='resume') entry=t;
    if((r.type==='pause'||r.type==='exit')&&entry!==null){mins+=t-entry;entry=null;}
  });
  if(entry!==null){const n=new Date();mins+=(n.getHours()*60+n.getMinutes())-entry;}
  return {h:Math.floor(mins/60),m:mins%60,total:mins};
}

function calcWeekHours() {
  const now=new Date(),mon=new Date(now);
  mon.setDate(now.getDate()-now.getDay()+1);mon.setHours(0,0,0,0);
  const monStr=mon.toISOString().slice(0,10);
  const wr=S.records.filter(r=>r.userId===S.user.id&&r.date>=monStr);
  const byDay={};
  wr.forEach(r=>{if(!byDay[r.date])byDay[r.date]=[];byDay[r.date].push(r);});
  let total=0;
  Object.values(byDay).forEach(dr=>{
    dr.sort((a,b)=>a.time.localeCompare(b.time));
    let e=null;
    dr.forEach(r=>{
      const [h,m]=r.time.split(':').map(Number),t=h*60+m;
      if(r.type==='entry'||r.type==='resume') e=t;
      if((r.type==='pause'||r.type==='exit')&&e!==null){total+=t-e;e=null;}
    });
  });
  return {h:Math.floor(total/60),m:total%60};
}

async function getLocation() {
  return new Promise(resolve=>{
    if(!navigator.geolocation){resolve({lat:'',lng:'',address:'No disponible'});return;}
    navigator.geolocation.getCurrentPosition(
      p=>resolve({lat:p.coords.latitude,lng:p.coords.longitude,address:`${p.coords.latitude.toFixed(5)}, ${p.coords.longitude.toFixed(5)}`}),
      _=>resolve({lat:'',lng:'',address:'Ubicación no obtenida'}),{timeout:7000,enableHighAccuracy:true}
    );
  });
}

function toast(type, msg, dur=4500) {
  const id='t'+Date.now(), ic={success:'✅',danger:'❌',info:'ℹ️',warn:'⚠️'}[type]||'ℹ️';
  const el=document.createElement('div');
  el.className=`toast toast-${type}`;el.id=id;el.innerHTML=`${ic} ${msg}`;
  document.getElementById('toasts').appendChild(el);
  setTimeout(()=>{const e=document.getElementById(id);if(e){e.style.opacity='0';e.style.transition='opacity .4s';setTimeout(()=>e.remove(),400);}},dur);
}

function buildCalendar(year, month, records, userId, prevId, nextId) {
  const firstDay = new Date(year, month, 1);
  const lastDay  = new Date(year, month+1, 0);
  let startDow   = firstDay.getDay(); // 0=dom
  if(startDow===0) startDow=7;        // lunes=1
  startDow -= 1;

  const monthStr = `${year}-${String(month+1).padStart(2,'0')}`;
  const byDay = {};
  records.filter(r => r.userId===userId && r.date.startsWith(monthStr)).forEach(r=>{
    if(!byDay[r.date]) byDay[r.date]=[];
    byDay[r.date].push(r);
  });

  const today = todayStr();
  const dayNames = ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];

  let cells = '';
  // Celdas vacías inicio
  for(let i=0;i<startDow;i++) cells+=`<div class="cal-day other-month"></div>`;
  // Días del mes
  for(let d=1;d<=lastDay.getDate();d++){
    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dayRecs = byDay[dateStr]||[];
    const isToday = dateStr===today;
    const hasEntry= dayRecs.some(r=>r.type==='entry');
    const types   = [...new Set(dayRecs.map(r=>r.type))];
    const dotColors= {entry:'var(--success)',exit:'var(--danger)',pause:'var(--warn)',resume:'var(--accent3)'};
    cells+=`<div class="cal-day${isToday?' today':''}${hasEntry?' has-entry':''}" data-cal-date="${dateStr}">
      <div class="cal-day-num">${d}</div>
      <div class="cal-dots">${types.map(t=>`<div class="cal-dot" style="background:${dotColors[t]||'var(--text3)'}"></div>`).join('')}</div>
    </div>`;
  }
  // Rellenar fin
  const totalCells = startDow + lastDay.getDate();
  const remaining  = totalCells%7===0?0:7-(totalCells%7);
  for(let i=0;i<remaining;i++) cells+=`<div class="cal-day other-month"></div>`;

  return `<div class="cal-wrap">
    <div class="cal-header">
      <button class="btn btn-ghost btn-sm" id="${prevId}">‹</button>
      <span class="cal-title">${MONTHS_ES[month]} ${year}</span>
      <button class="btn btn-ghost btn-sm" id="${nextId}">›</button>
    </div>
    <div class="cal-grid">
      ${dayNames.map(d=>`<div class="cal-day-name">${d}</div>`).join('')}
      ${cells}
    </div>
  </div>`;
}

function calcEmpMonthStats(recs, year, month) {
  const prefix = `${year}-${String(month).padStart(2,'0')}`;
  const monthRecs = recs.filter(r => r.date && r.date.startsWith(prefix));
  const byDay = {};
  monthRecs.forEach(r => { if(!byDay[r.date]) byDay[r.date]=[]; byDay[r.date].push(r); });
  let totalMins = 0;
  Object.values(byDay).forEach(dr => {
    dr.sort((a,b) => a.time.localeCompare(b.time));
    let entry = null;
    dr.forEach(r => {
      const [h,m] = r.time.split(':').map(Number), t = h*60+m;
      if(r.type==='entry'||r.type==='resume') entry = t;
      if((r.type==='pause'||r.type==='exit') && entry!==null){ totalMins += t-entry; entry=null; }
    });
  });
  return { hours: Math.floor(totalMins/60), mins: totalMins%60, days: Object.keys(byDay).length, recs: monthRecs };
}

      <button class="btn btn-ghost btn-sm" id="btn-close-modal">✕</button>
    </div>
    <div class="flex gap8 mb16" style="flex-wrap:wrap">
      <select class="input-field" id="modal-sel-month" style="width:150px;padding:8px 12px;font-size:13px">${monthOptions}</select>
      <select class="input-field" id="modal-sel-year"  style="width:100px;padding:8px 12px;font-size:13px">${yearOptions}</select>
      <button class="btn btn-accent btn-sm" id="btn-modal-filter">Ver período</button>
    </div>
    <div class="grid-stats mb16" style="grid-template-columns:repeat(3,1fr)">
      <div class="stat-card"><div class="stat-label">Horas — ${MONTHS_ES[selMonth-1]} ${selYear}</div><div class="stat-val">${hours}h ${String(mins).padStart(2,'0')}m</div></div>
      <div class="stat-card"><div class="stat-label">Días trabajados</div><div class="stat-val">${days}</div></div>
      <div class="stat-card"><div class="stat-label">Fichajes en período</div><div class="stat-val">${recs.length}</div></div>
    </div>
    <div class="table-wrap">${buildRecordsTable(recs.length ? recs : allRecs)}</div>
  </div></div>`;
}

    <div class="flex-between mb16"><h3>📍 Ubicación del fichaje</h3><button class="btn btn-ghost btn-sm" id="btn-close-location">✕</button></div>

// ===================== EVENTS =====================
const qs=s=>document.querySelector(s);
const qsa=s=>document.querySelectorAll(s);
const on=(id,ev,fn)=>{const el=document.getElementById(id);if(el)el.addEventListener(ev,fn);};
const onKey=(id,k,fn)=>{const el=document.getElementById(id);if(el)el.addEventListener('keydown',e=>{if(e.key===k)fn();});};
const val=id=>{const el=document.getElementById(id);return el?el.value.trim():'';};

function attachEvents() {
  on('btn-login','click',doLogin);
  onKey('login-pass','Enter',doLogin);
  onKey('login-email','Enter',()=>document.getElementById('login-pass')?.focus());
  on('btn-changepass','click',doChangePass);
  onKey('new-pass2','Enter',doChangePass);
  on('btn-logout','click',()=>{S={...S,user:null,view:'login',records:[],corrections:[],employees:[],alert:null,modal:null,reportData:null};render();});

  qsa('[data-emp-section]').forEach(el=>el.addEventListener('click',()=>{S.employeeSection=el.dataset.empSection;render();}));
  qsa('[data-admin-section]').forEach(el=>el.addEventListener('click',()=>{S.adminSection=el.dataset.adminSection;render();}));

  // Fichar
  on('btn-f-entry','click',()=>doFichar('entry'));
  on('btn-f-pause','click',()=>doFichar('pause'));
  on('btn-f-resume','click',()=>doFichar('resume'));
  on('btn-f-exit','click',()=>doFichar('exit'));

  // Historial tabs
  on('tab-lista','click',()=>{S.historialTab='lista';render();});
  on('tab-calendario','click',()=>{S.historialTab='calendario';render();});
  on('cal-prev','click',()=>{S.calMonth--;if(S.calMonth<0){S.calMonth=11;S.calYear--;}render();});
  on('cal-next','click',()=>{S.calMonth++;if(S.calMonth>11){S.calMonth=0;S.calYear++;}render();});

  // Admin historial tabs
  on('admin-tab-lista','click',()=>{S.adminHistorialTab='lista';render();});
  on('admin-tab-calendario','click',()=>{S.adminHistorialTab='calendario';render();});
  on('admin-cal-prev','click',()=>{S.adminCalMonth--;if(S.adminCalMonth<0){S.adminCalMonth=11;S.adminCalYear--;}render();});
  on('admin-cal-next','click',()=>{S.adminCalMonth++;if(S.adminCalMonth>11){S.adminCalMonth=0;S.adminCalYear++;}render();});

  // Filtros
  on('filter-month','change',()=>{S.historialFilter=val('filter-month');render();});
  on('btn-clear-filter','click',()=>{S.historialFilter='';render();});
  on('admin-filter-emp','change',()=>{S.adminHistorialFilter=val('admin-filter-emp')||'';render();});
  on('btn-export-csv','click',exportCSV);

  // Empleados admin
  on('btn-add-employee','click',()=>{S.modal={type:'addEmployee'};render();});
  on('btn-save-employee','click',doAddEmployee);
  on('btn-update-employee','click',doUpdateEmployee);
  qsa('[data-edit-emp]').forEach(el=>el.addEventListener('click',()=>{S.modal={type:'editEmployee',empId:el.dataset.editEmp};render();}));
  qsa('[data-view-emp]').forEach(el=>el.addEventListener('click',()=>doViewEmpHistory(el.dataset.viewEmp)));
  qsa('[data-del-emp]').forEach(el=>el.addEventListener('click',()=>{S.modal={type:'confirmDelete',empId:el.dataset.delEmp,empName:el.dataset.delName};render();}));
  on('btn-confirm-delete','click',doDeleteEmployee);

  // Correcciones
  qsa('[data-approve]').forEach(el=>el.addEventListener('click',()=>doUpdateCorrection(el.dataset.approve,'approved')));
  qsa('[data-reject]').forEach(el=>el.addEventListener('click',()=>doUpdateCorrection(el.dataset.reject,'rejected')));
  on('btn-new-correction','click',()=>{S.modal={type:'newCorrection'};render();});
  on('btn-save-correction','click',doSaveCorrection);

  // Informes PDF
  on('btn-gen-report','click',doGenReportEmp);
  on('btn-gen-report-admin','click',doGenReportAdmin);

  // Modal historial empleado — filtro mes/año
  on('btn-modal-filter','click',()=>{
    const m=document.getElementById('modal-sel-month');
    const y=document.getElementById('modal-sel-year');
    if(m&&y){ S.modal.selMonth=parseInt(m.value); S.modal.selYear=parseInt(y.value); render(); }
  });

  // Cerrar modals
  ['btn-close-modal','btn-close-modal2'].forEach(id=>on(id,'click',()=>{S.modal=null;render();}));
  on('btn-close-location','click',()=>{S.locationModal=null;render();});
  const ov=qs('#modal-overlay');if(ov)ov.addEventListener('click',e=>{if(e.target===ov){S.modal=null;render();}});
  const lv=qs('#loc-overlay');if(lv)lv.addEventListener('click',e=>{if(e.target===lv){S.locationModal=null;render();}});
  qsa('.loc-btn').forEach(el=>el.addEventListener('click',()=>{S.locationModal={lat:el.dataset.lat,lng:el.dataset.lng,address:el.dataset.addr};render();}));
}

// ===================== ACTIONS =====================
async function doLogin() {
  const btn=document.getElementById('btn-login');
  if(btn){btn.disabled=true;btn.innerHTML='<div class="spinner"></div> Verificando...';}
  const email=val('login-email'),pass=val('login-pass');
  if(!email||!pass){S.alert={type:'danger',msg:'Introduce email y contraseña.'};render();return;}
  const res=await api('login',{email,password:pass});
  if(res.error){S.alert={type:'danger',msg:res.error};render();return;}
  S.user=res.user;S.alert=null;
  if(S.user.mustChangePass){S.view='changepass';render();return;}
  await loadUserData();
  S.view='app';render();
}

async function doChangePass() {
  const p1=val('new-pass'),p2=val('new-pass2');
  if(p1.length<8){S.alert={type:'danger',msg:'Mínimo 8 caracteres.'};render();return;}
  if(p1!==p2){S.alert={type:'danger',msg:'Las contraseñas no coinciden.'};render();return;}
  const btn=document.getElementById('btn-changepass');
  if(btn){btn.disabled=true;btn.innerHTML='<div class="spinner"></div> Guardando...';}
  const res=await api('changePassword',{userId:S.user.id,newPassword:p1});
  if(res.error){S.alert={type:'danger',msg:res.error};render();return;}
  S.user.mustChangePass=false;S.alert=null;
  await loadUserData();
  S.view='app';render();
  toast('success','Contraseña actualizada correctamente.');
}

async function loadUserData() {
  if(S.user.role==='admin'){
    const [emps,cors,recs]=await Promise.all([api('getEmployees'),api('getCorrections',{role:'admin'}),api('getAllRecords',{})]);
    S.employees=emps.ok?emps.employees:[];
    S.corrections=cors.ok?cors.corrections:[];
    S.records=recs.ok?recs.records:[];
  } else {
    const [recs,cors]=await Promise.all([api('getRecords',{userId:S.user.id}),api('getCorrections',{userId:S.user.id,role:'employee'})]);
    S.records=recs.ok?recs.records:[];
    S.corrections=cors.ok?cors.corrections:[];
  }
}

async function doFichar(type) {
  S.ficharLoading=true;render();
  const loc=await getLocation();
  const res=await api('addRecord',{userId:S.user.id,userName:S.user.name,type,lat:loc.lat,lng:loc.lng,address:loc.address});
  S.ficharLoading=false;
  if(res.error){toast('danger',res.error);render();return;}
  const recs=await api('getRecords',{userId:S.user.id});
  if(recs.ok) S.records=recs.records;
  const labels={entry:'Entrada registrada ✅',pause:'Pausa iniciada ⏸️',resume:'Fin de pausa ▶️',exit:'Salida registrada 👋'};
  toast('success',`${labels[type]} a las ${res.record.time}`);
  render();
}

async function doAddEmployee() {
  const name=val('m-name'),email=val('m-email'),dept=val('m-dept'),horaEntrada=val('m-hora');
  if(!name||!email||!dept){S.modal.error='Rellena todos los campos.';render();return;}
  const btn=document.getElementById('btn-save-employee');
  if(btn){btn.disabled=true;btn.innerHTML='<div class="spinner"></div> Guardando...';}
  const res=await api('addEmployee',{name,email,dept,horaEntrada:horaEntrada||'09:00'});
  if(res.error){S.modal.error=res.error;render();return;}
  S.employees.push({id:res.id,name,email,dept,horaEntrada:horaEntrada||'09:00',mustChangePass:true});
  S.modal=null;toast('success',`Empleado ${name} añadido correctamente.`);render();
}

async function doUpdateEmployee() {
  const empId=S.modal.empId;
  const name=val('m-name'),email=val('m-email'),dept=val('m-dept'),horaEntrada=val('m-hora');
  const btn=document.getElementById('btn-update-employee');
  if(btn){btn.disabled=true;btn.innerHTML='<div class="spinner"></div> Guardando...';}
  const res=await api('updateEmployee',{userId:empId,name,email,dept,horaEntrada});
  if(res.error){S.modal.error=res.error;render();return;}
  const emp=S.employees.find(e=>e.id===empId);
  if(emp){emp.name=name||emp.name;emp.email=email||emp.email;emp.dept=dept||emp.dept;emp.horaEntrada=horaEntrada||emp.horaEntrada;}
  S.modal=null;toast('success','Empleado actualizado correctamente.');render();
}

async function doDeleteEmployee() {
  const id=S.modal.empId,name=S.modal.empName;
  const btn=document.getElementById('btn-confirm-delete');
  if(btn){btn.disabled=true;btn.innerHTML='<div class="spinner"></div>';}
  const res=await api('deleteEmployee',{userId:id});
  if(res.error){toast('danger',res.error);return;}
  S.employees=S.employees.filter(e=>e.id!==id);
  S.modal=null;toast('success',`${name} eliminado del sistema.`);render();
}

async function doViewEmpHistory(empId) {
  toast('info','Cargando historial...');
  const res = await api('getAllRecords',{filterUserId:empId});
  const now = new Date();
  S.modal = {
    type: 'viewEmpHistory',
    empId,
    recs: res.ok ? res.records : [],
    selYear:  now.getFullYear(),
    selMonth: now.getMonth()+1
  };
  render();
}

async function doUpdateCorrection(id,status) {
  const note=val(`note-${id}`);
  const res=await api('updateCorrection',{correctionId:id,status,adminNote:note||(status==='approved'?'Solicitud aprobada.':'Solicitud rechazada.')});
  if(res.error){toast('danger',res.error);return;}
  const c=S.corrections.find(c=>c.id===id);
  if(c){c.status=status;c.adminNote=note||(status==='approved'?'Aprobada.':'Rechazada.');}
  toast(status==='approved'?'success':'danger',status==='approved'?'Solicitud aprobada.':'Solicitud rechazada.');render();
}

async function doSaveCorrection() {
  const date=val('m-date'),desc=val('m-desc');
  const startTime=val('m-start'),endTime=val('m-end');
  if(!date||!desc){S.modal.error='Completa todos los campos.';render();return;}
  const btn=document.getElementById('btn-save-correction');
  if(btn){btn.disabled=true;btn.innerHTML='<div class="spinner"></div> Enviando...';}
  const res=await api('addCorrection',{userId:S.user.id,userName:S.user.name,date,description:desc,startTime,endTime});
  if(res.error){S.modal.error=res.error;render();return;}
  S.corrections.unshift({id:res.id,userId:S.user.id,date,description:desc,status:'pending',adminNote:'',createdAt:new Date().toISOString()});
  S.modal=null;toast('success','Solicitud de corrección enviada.');render();
}

function buildReportFromRecords(userId, year, month) {
  const prefix = `${year}-${String(month).padStart(2,'0')}`;
  const targets = userId
    ? [S.employees.find(e=>e.id===userId)||{id:userId,name:S.user.name,dept:S.user.dept||'—'}]
    : S.employees.length ? S.employees : [{id:S.user.id,name:S.user.name,dept:S.user.dept||'—'}];

  return targets.map(emp => {
    const recs = S.records.filter(r=>r.userId===emp.id && r.date.startsWith(prefix));
    const byDay = {};
    recs.forEach(r=>{ if(!byDay[r.date]) byDay[r.date]=[]; byDay[r.date].push(r); });
    let totalMins = 0;
    const days = {};
    Object.entries(byDay).forEach(([date,dr])=>{
      dr.sort((a,b)=>a.time.localeCompare(b.time));
      let entry=null, dayMins=0;
      dr.forEach(r=>{
        const [h,m]=r.time.split(':').map(Number), t=h*60+m;
        if(r.type==='entry'||r.type==='resume') entry=t;
        if((r.type==='pause'||r.type==='exit')&&entry!==null){dayMins+=t-entry;entry=null;}
      });
      totalMins+=dayMins;
      days[date]={hours:Math.floor(dayMins/60),minutes:dayMins%60,records:dr.map(r=>({type:r.type,time:r.time}))};
    });
    return {
      userId:emp.id, name:emp.name||emp.nombre, dept:emp.dept||emp.departamento||'—',
      totalMins, totalHours:Math.floor(totalMins/60), totalMinutes:totalMins%60,
      daysWorked:Object.keys(days).length, days
    };
  });
}

function doGenReportEmp() {
  const month=val('report-month'),year=val('report-year');
  if(!month||!year) return;
  const prefix=`${year}-${String(parseInt(month)).padStart(2,'0')}`;
  const report=buildReportFromRecords(S.user.id, year, parseInt(month));
  if(!report.length||!Object.keys(report[0].days).length){
    toast('warn','No hay fichajes en este período.');return;
  }
  S.reportData=report; S.reportMonth=prefix;
  render();
}

function doGenReportAdmin() {
  const month=val('report-month'),year=val('report-year'),empId=val('report-emp');
  if(!month||!year) return;
  const prefix=`${year}-${String(parseInt(month)).padStart(2,'0')}`;
  const report=buildReportFromRecords(empId||null, year, parseInt(month));
  if(!report.length){toast('warn','No hay fichajes en este período.');return;}
  S.reportData=report; S.reportMonth=prefix;
  render();
}

function downloadPDF(report, monthPrefix, isAdmin) {
  if(!report||!report.length){toast('warn','No hay datos para generar el PDF');return;}
  const {jsPDF} = window.jspdf;
  const doc = new jsPDF();
  const [year,month] = monthPrefix.split('-');
  const monthName = MONTHS_ES[parseInt(month)-1];

  let y = 20;

  // Cabecera
  doc.setFillColor(26,26,46);
  doc.rect(0,0,210,35,'F');
  doc.setTextColor(167,139,250);
  doc.setFontSize(20);
  doc.setFont('helvetica','bold');
  doc.text('FichajesPro', 14, 18);
  doc.setTextColor(255,255,255);
  doc.setFontSize(11);
  doc.setFont('helvetica','normal');
  doc.text(`Informe mensual · ${monthName} ${year}`, 14, 28);

  y = 50;

  report.forEach((emp, idx) => {
    if(idx>0){ doc.addPage(); y=20; }

    // Info empleado
    doc.setTextColor(30,30,60);
    doc.setFontSize(14);
    doc.setFont('helvetica','bold');
    doc.text(emp.name, 14, y);
    y+=7;
    doc.setFontSize(10);
    doc.setFont('helvetica','normal');
    doc.setTextColor(100,100,130);
    doc.text(`${emp.dept} · ${monthName} ${year}`, 14, y);
    y+=10;

    // Stats
    doc.setFillColor(240,240,255);
    doc.rect(14, y, 55, 22, 'F');
    doc.rect(74, y, 55, 22, 'F');
    doc.rect(134, y, 55, 22, 'F');

    doc.setTextColor(108,99,255);
    doc.setFontSize(16);
    doc.setFont('helvetica','bold');
    doc.text(`${emp.totalHours}h ${String(emp.totalMinutes).padStart(2,'0')}m`, 41, y+10, {align:'center'});
    doc.text(`${emp.daysWorked}`, 101, y+10, {align:'center'});
    doc.text(emp.daysWorked?`${Math.floor(emp.totalMins/emp.daysWorked/60)}h`:'—', 161, y+10, {align:'center'});

    doc.setTextColor(130,130,160);
    doc.setFontSize(8);
    doc.setFont('helvetica','normal');
    doc.text('Horas totales', 41, y+18, {align:'center'});
    doc.text('Días trabajados', 101, y+18, {align:'center'});
    doc.text('Media diaria', 161, y+18, {align:'center'});
    y+=30;

    // Tabla
    doc.setFillColor(26,26,46);
    doc.rect(14, y, 182, 8, 'F');
    doc.setTextColor(255,255,255);
    doc.setFontSize(8);
    doc.setFont('helvetica','bold');
    doc.text('FECHA', 18, y+5.5);
    doc.text('HORAS', 80, y+5.5);
    doc.text('FICHAJES', 130, y+5.5);
    y+=8;

    const dates = Object.keys(emp.days).sort();
    dates.forEach((d, i) => {
      const day = emp.days[d];
      if(y>270){doc.addPage();y=20;}
      doc.setFillColor(i%2===0?250:255, i%2===0?250:255, i%2===0?255:255);
      doc.rect(14, y, 182, 8, 'F');
      doc.setTextColor(50,50,80);
      doc.setFontSize(9);
      doc.setFont('helvetica','normal');
      doc.text(fmtDate(d), 18, y+5.5);
      doc.setFont('helvetica','bold');
      doc.text(`${day.hours}h ${String(day.minutes).padStart(2,'0')}m`, 80, y+5.5);
      doc.setFont('helvetica','normal');
      doc.setFontSize(8);
      const fichajes = day.records.map(r=>`${typeLabel[r.type]||r.type} ${r.time}`).join(' · ');
      doc.text(fichajes, 130, y+5.5);
      y+=8;
    });

    // Firma
    y+=15;
    doc.setDrawColor(200,200,220);
    doc.line(14, y, 100, y);
    y+=5;
    doc.setFontSize(8);
    doc.setTextColor(150,150,180);
    doc.text('Firma del empleado', 14, y);
    doc.line(110, y-5, 196, y-5);
    doc.text('Firma del responsable', 110, y);

    // Pie
    y+=20;
    doc.setFontSize(7);
    doc.setTextColor(180,180,200);
    doc.text(`Generado por FichajesPro · ${new Date().toLocaleDateString('es-ES')} · Ley 10/2021 · RDL 8/2019`, 105, 290, {align:'center'});
  });

  doc.save(`informe_${monthPrefix}.pdf`);
  toast('success','PDF descargado correctamente.');
}

function exportCSV() {
  const recs=S.adminHistorialFilter?S.records.filter(r=>r.userId===S.adminHistorialFilter):[...S.records];
  recs.sort((a,b)=>b.date.localeCompare(a.date)||b.time.localeCompare(a.time));
  const rows=[['Empleado','Departamento','Fecha','Tipo','Hora','Latitud','Longitud','Dirección']];
  recs.forEach(r=>{
    const emp=S.employees.find(e=>e.id===r.userId)||{name:r.name||'—',dept:'—'};
    rows.push([emp.name,emp.dept||'—',r.date,typeLabel[r.type]||r.type,r.time,r.lat||'',r.lng||'',r.address||'']);
  });
  const csv=rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
  a.download=`fichajes_${new Date().toISOString().slice(0,10)}.csv`;a.click();
  toast('success','CSV exportado correctamente.');
}
